var mp=0;var px=Y+'-'+String(m+1).padStart(2,'0');
Object.entries(D).forEach(function(e){if(e[0].startsWith(px))mp+=e[1][0]});
h+='<div class="mo"><div class="mh"><span>'+MN[m]+'</span><span class="mp" style="color:'+cl(mp)+'">'+fm(mp)+'</span></div>';
h+='<div class="dw"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div><div class="gr">';
var f=new Date(Y,m,1),dm=new Date(Y,m+1,0).getDate();
for(var i=0;i<f.getDay();i++)h+='<div class="dy em"></div>';
for(var d=1;d<=dm;d++){
var k=Y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
var info=D[k];
if(info){
var pnl=info[0],cnt=info[1].length;
h+='<div class="dy ht" data-k="'+k+'">';
h+='<div class="dn">'+d+'</div>';
h+='<div class="dp" style="color:'+cl(pnl)+'">'+fm(pnl)+'</div>';
if(cnt>1)h+='<div class="dc">'+cnt+' trades</div>';
}else{
h+='<div class="dy"><div class="dn" style="color:#334155">'+d+'</div>';
}
h+='</div>';}
h+='</div></div>';}
$('cal').innerHTML=h;
document.querySelectorAll('.ht').forEach(function(el){
el.addEventListener('click',function(){sd(this.getAttribute('data-k'))});
});}
function sd(k){
var info=D[k];if(!info)return;
var pnl=info[0],trades=info[1];
var dt=new Date(k+'T12:00:00');
$('mD').textContent=dt.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
var mt=$('mT');mt.textContent=fm(pnl)+' ('+trades.length+' trade'+(trades.length>1?'s':'')+')';mt.style.color=cl(pnl);
var h='';
trades.forEach(function(t){
var dir=t[2]==='l';
var db=dir?'<span class="bg bl">LONG</span>':'<span class="bg bs">SHORT</span>';
var rn=RN[t[0]]||t[0];
h+='<div class="tc">';
h+='<div class="tth"><span class="tr">'+rn+'</span><div class="tb">'+db+'<span class="bg bd">\u0394 '+t[6]+'</span></div></div>';
h+='<div class="to">'+t[3]+'</div>';
h+='<div class="tg"><div>';
h+='<div class="tw"><span class="tl">Entry</span><span class="tv">$'+t[8].toFixed(2)+' @ '+t[10]+'</span></div>';
h+='<div class="tw"><span class="tl">Exit</span><span class="tv">$'+t[9].toFixed(2)+' @ '+t[11]+'</span></div>';
h+='</div><div>';
h+='<div class="tw"><span class="tl">Contracts</span><span class="tv">'+t[7]+'</span></div>';
h+='<div class="tw"><span class="tl">Premium</span><span class="tv">$'+t[12].toLocaleString()+'</span></div>';
h+='</div></div>';
h+='<div class="tp" style="color:'+cl(t[13])+'">'+fm(t[13])+' ('+t[14]+'%)</div>';
h+='</div>';});
$('mB').innerHTML=h;
$('ov').classList.add('op');}
function cm(e){if(e.target===$('ov'))$('ov').classList.remove('op')}
document.addEventListener('keydown',function(e){if(e.key==='Escape')$('ov').classList.remove('op')});
rn();
</script></body></html>
