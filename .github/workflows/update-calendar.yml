name: Update Calendar & Dashboard

on:
  schedule:
    # Run weekdays at 4:30 PM ET (21:30 UTC) after market close
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch recent trades from Polygon
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
        run: python3 fetch_recent_signals.py

      - name: Rebuild V9 calendar
        run: python3 build_calendar.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/options_pnl_calendar_v9.html output/recent_trades.json output/exit_sim_1min_cache.json
          git diff --staged --quiet || git commit -m "Auto-update: V9 calendar $(date +%Y-%m-%d)"
          git push
